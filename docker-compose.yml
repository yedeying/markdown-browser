version: "3.8"

services:
  vmd:
    build:
      context: .
      dockerfile: Dockerfile
    image: vmd:latest
    container_name: vmd-server
    ports:
      - "8197:8888"
    volumes:
      # 挂载宿主机工作区（根目录）到容器 /workspace
      # 容器内通过 .vmd-config.json 选择工作区内的子目录作为"挂载点"
      # 兼容旧变量 VMD_WORKDIR
      - ${VMD_WORKSPACE:-${VMD_WORKDIR:-/home/private}}:/workspace
    environment:
      DOCKER_CONTAINER: "true"
      TZ: Asia/Shanghai
      # 访问密码（保护整站）
      VMD_PASSWORD: ${VMD_PASSWORD:-}
      # 管理员密码（可选；用于在线编辑挂载点配置）
      VMD_ADMIN_PASSWORD: ${VMD_ADMIN_PASSWORD:-}
    # 资源限制（可选）
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "1"
          memory: 256M
    # 健康检查
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:8888').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 重启策略
    restart: unless-stopped
    # 容器日志
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
