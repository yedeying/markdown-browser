version: "3.8"

services:
  vmd:
    build:
      context: .
      dockerfile: Dockerfile
    image: vmd:latest
    container_name: vmd-server
    ports:
      - "8197:8888"
    volumes:
      # 挂载本地 markdown 目录（支持编辑，去掉 :ro 即可写）
      - ${VMD_WORKDIR:-/home/private/.hermes}:/markdown
    environment:
      DOCKER_CONTAINER: "true"
      TZ: Asia/Shanghai
      # 访问密码从 .env 文件读取（.env 不入库）
      VMD_PASSWORD: ${VMD_PASSWORD:-}
    # 资源限制（可选）
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "1"
          memory: 256M
    # 健康检查
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:8888').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 重启策略
    restart: unless-stopped
    # 容器日志
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
